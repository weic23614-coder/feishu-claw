<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>壹药网早报数据分析看板 - 归档</title>
    <style>
        :root {
            --primary-color: #667eea;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-primary: #262626;
            --text-secondary: #8c8c8c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

        header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .archive-list {
            list-style: none;
        }

        .archive-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-radius: 10px;
            margin-bottom: 12px;
            background: #fafafa;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text-primary);
        }

        .archive-item:hover {
            background: #f0f5ff;
            transform: translateX(4px);
        }

        .archive-item .date {
            font-weight: 600;
            font-size: 15px;
        }

        .archive-item .desc {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .archive-item .badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        footer {
            text-align: center;
            padding: 24px;
            color: var(--text-secondary);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 壹药网早报数据分析看板</h1>
            <p>历史版本归档列表 | 定期更新</p>
        </header>

        <div class="section">
            <h2>🚀 最新版本</h2>
            <a href="dashboard.html" class="archive-item">
                <div>
                    <div class="date">2026-04-01</div>
                    <div class="desc">GMV/毛利额/顾客数/新客率/毛利率 | 每日趋势 | 渠道/科室/省份占比分析</div>
                </div>
                <span class="badge">最新</span>
            </a>
        </div>

        <div class="section">
            <h2>📁 历史版本</h2>
            <div class="empty">
                暂无历史版本<br>
                <small>每次更新数据后会自动归档</small>
            </div>
        </div>

        <footer>
            由 OpenClaw 自动生成和归档
        </footer>
    </div>
</body>
</html>
